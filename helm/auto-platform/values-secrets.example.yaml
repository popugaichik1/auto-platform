# Шаблон для реальных секретов — копируйте в values-secrets.yaml (этот файл
# уже в .gitignore, commit'ить его НЕЛЬЗЯ) и подставьте туда настоящие
# значения. Структура полей — точно такая же, как в values.yaml, поэтому
# helm просто перезатирает нужные листья при наложении файлов:
#
#   helm upgrade auto-platform . -n auto-platform \
#     -f values.yaml -f values-production.yaml -f values-secrets.yaml
#
# Если какого-то значения здесь не будет — останется CHANGE_ME из
# values.yaml (увидите сразу по упавшему сервису/ошибке аутентификации).

services:
  auth:
    secretEnv:
      JWT_SECRET: "CHANGE_ME"
    postgres:
      password: "CHANGE_ME"

  listing:
    postgres:
      password: "CHANGE_ME"

  user:
    postgres:
      password: "CHANGE_ME"

  messenger:
    postgres:
      password: "CHANGE_ME"

  storage:
    secretEnv:
      S3_ACCESS_KEY: "CHANGE_ME"
      S3_SECRET_KEY: "CHANGE_ME"
