{{- /*
Заготовки SealedSecret — применяются ТОЛЬКО когда
global.secretsManagedExternally: true (см. values-production.yaml), иначе
эти же Secret'ы создаёт сам чарт из values (app.yaml/postgres.yaml).

Шифрование делается один раз, руками, на машине с доступом к реальному
кластеру (там, где установлен Sealed Secrets controller) — я не могу это
сделать сам, нет доступа к сертификату вашего кластера. Команда на каждый
секрет — в комментарии прямо над соответствующим блоком ниже. Результат
кладёте под "encryptedData:" вместо плейсхолдера, всё остальное не трогаете.

Получить сертификат для шифрования (один раз, можно сохранить локально):
  kubeseal --controller-namespace kube-system --fetch-cert > sealed-secrets-cert.pem
*/ -}}
{{- if .Values.global.secretsManagedExternally }}

# kubectl create secret generic auto-platform-auth -n auto-platform \
#   --from-literal=JWT_SECRET='<реальный JWT secret>' --dry-run=client -o yaml | \
#   kubeseal --cert sealed-secrets-cert.pem --format yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: auto-platform-auth
  namespace: auto-platform
spec:
  encryptedData: 
    JWT_SECRET: 
  template:
    metadata:
      name: auto-platform-auth
      namespace: auto-platform
    type: Opaque

