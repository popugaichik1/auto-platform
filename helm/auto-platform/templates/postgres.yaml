{{- range $key, $svc := .Values.services }}
{{- if $svc.postgres.enabled }}
{{- if not $.Values.global.secretsManagedExternally }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auto-platform.postgresName" (dict "root" $ "key" $key) }}
  labels:
    {{- include "auto-platform.labels" (dict "root" $ "key" $key) | nindent 4 }}
type: Opaque
stringData:
  password: {{ $svc.postgres.password | quote }}
{{- end }}

#Если постгрес задэплоен на кластере то
{{- if not $svc.postgres.external }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "auto-platform.postgresName" (dict "root" $ "key" $key) }}
  labels:
    {{- include "auto-platform.labels" (dict "root" $ "key" $key) | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ $key }}-postgres
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "auto-platform.postgresName" (dict "root" $ "key" $key) }}
  labels:
    {{- include "auto-platform.labels" (dict "root" $ "key" $key) | nindent 4 }}
spec:
  serviceName: {{ include "auto-platform.postgresName" (dict "root" $ "key" $key) }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $key }}-postgres
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $key }}-postgres
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/part-of: auto-platform
    spec:
      containers:
        - name: postgres
          image: {{ $.Values.global.postgresImage }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ $svc.postgres.username | quote }}
            - name: POSTGRES_DB
              value: {{ $svc.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "auto-platform.postgresName" (dict "root" $ "key" $key) }}
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $svc.postgres.username | quote }}, "-d", {{ $svc.postgres.database | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $svc.postgres.username | quote }}, "-d", {{ $svc.postgres.database | quote }}]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml $svc.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $svc.postgres.storageSize }}
{{- end }}
{{- end }}
{{- end }}