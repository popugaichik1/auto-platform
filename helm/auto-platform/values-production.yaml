# Оверрай для реального кластера в Timeweb Cloud. Накладывается поверх
# values.yaml (который уже содержит дефолты, рассчитанные на прод —
# imageRegistry: ghcr.io/popugaichik1, host: kolesa.example.com):
#
# Управляется ArgoCD (Application смотрит на этот файл) — после установки
# вручную (см. инструкцию) дальнейшие helm upgrade делать не нужно, ArgoCD
# сам подтягивает изменения из git.

# CHANGE_ME: ваш реальный домен, на который смотрит DNS A-запись на внешний
# IP ingress-nginx в кластере Timeweb
ingress:
  host: "CHANGE_ME.example.com"

# Пакеты в GHCR приватные по умолчанию — пуллить их из кластера нужно по
# секрету. Сам секрет нужно создать в кластере руками (см. инструкцию),
# здесь только подключаем его по имени.
global:
  imagePullSecrets:
    - name: ghcr-pull-secret
  # Secret'ы (JWT_SECRET, пароли Postgres, S3-ключи) кладёт Sealed Secrets
  # controller из templates/sealed-secrets.yaml — сам чарт их не создаёт
  # из CHANGE_ME-значений в values.yaml.
  secretsManagedExternally: true

# Теги образов — CI обновляет их автоматически после каждого успешного
# билда конкретного сервиса (см. .github/workflows/ci.yml, джоба deploy).
# Начальное значение здесь не важно, оно будет перезаписано первым деплоем.
services:
  auth:
    image:
      tag: "latest"
  listing:
    image:
      tag: "latest"
  user:
    image:
      tag: "latest"
  messenger:
    image:
      tag: "latest"
  storage:
    image:
      tag: "latest"

frontend:
  image:
    tag: "latest"
