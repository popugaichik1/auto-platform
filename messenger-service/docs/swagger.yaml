basePath: /api/messenger
definitions:
  transport_http.ConversationResponse:
    properties:
      buyer_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      last_message_at:
        type: string
      listing_id:
        type: string
      seller_id:
        type: string
    type: object
  transport_http.CreateConversationRequest:
    properties:
      listing_id:
        type: string
      recipient_id:
        type: string
    required:
    - listing_id
    - recipient_id
    type: object
  transport_http.MessageResponse:
    properties:
      body:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      sender_id:
        type: string
    type: object
info:
  contact: {}
  description: Сервис переписки покупателей и продавцов auto-platform.
  title: Messenger Service API
  version: "1.0"
paths:
  /conversations:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/transport_http.ConversationResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Список моих тредов переписки
      tags:
      - messenger
    post:
      consumes:
      - application/json
      description: Создаёт тред по объявлению с указанным собеседником, либо возвращает
        уже существующий (требует авторизации)
      parameters:
      - description: Объявление и собеседник
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/transport_http.CreateConversationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/transport_http.ConversationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создать или получить тред переписки
      tags:
      - messenger
  /conversations/{id}/messages:
    get:
      parameters:
      - description: ID треда
        in: path
        name: id
        required: true
        type: string
      - description: Страница
        in: query
        name: page
        type: integer
      - description: Размер страницы
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/transport_http.MessageResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: История сообщений треда
      tags:
      - messenger
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - messenger
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
